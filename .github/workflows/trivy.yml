name: Trivy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  filesystem-scan:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  api-image-scan:
    name: API Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: local/api:trivy

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/api:trivy
          exit-code: 1
          format: sarif
          output: trivy-api-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload API image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api-image.sarif

  web-image-scan:
    name: Web Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            VITE_API_URL=https://example.invalid/api/v1
          load: true
          tags: local/web:trivy

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/web:trivy
          exit-code: 1
          format: sarif
          output: trivy-web-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload web image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web-image.sarif
