version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-all-updates:
        update-types:
          - major
          - minor
          - patch
    ignore:
      - dependency-name: "node"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "08:30"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-all-updates:
        patterns:
          - "*"
